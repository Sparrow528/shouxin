<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 音乐播放器</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.player-container {
  width: 100%;
  max-width: 520px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Search */
.search-box {
  display: flex;
  gap: 8px;
}
.search-box input {
  flex: 1;
  padding: 12px 16px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  background: rgba(255,255,255,0.08);
  color: #fff;
  font-size: 15px;
  outline: none;
  transition: border 0.2s;
}
.search-box input:focus { border-color: #6366f1; }
.search-box button {
  padding: 12px 20px;
  border: none;
  border-radius: 12px;
  background: #6366f1;
  color: #fff;
  font-size: 15px;
  cursor: pointer;
  transition: background 0.2s;
}
.search-box button:hover { background: #4f46e5; }

/* Search results */
.results-panel {
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  max-height: 300px;
  overflow-y: auto;
  display: none;
}
.results-panel.active { display: block; }
.result-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  transition: background 0.15s;
}
.result-item:hover { background: rgba(255,255,255,0.1); }
.result-item .idx { color: #888; font-size: 13px; min-width: 22px; text-align: center; }
.result-item .info { flex: 1; min-width: 0; }
.result-item .title { font-size: 14px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-item .artist { font-size: 12px; color: #999; margin-top: 2px; }
.result-item .add-btn {
  background: none; border: 1px solid rgba(255,255,255,0.2); color: #aaa;
  border-radius: 8px; padding: 4px 10px; font-size: 13px; cursor: pointer;
  white-space: nowrap;
}
.result-item .add-btn:hover { background: #6366f1; border-color: #6366f1; color: #fff; }

/* Now playing */
.now-playing {
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
}
.now-playing .cover {
  width: 200px; height: 200px;
  margin: 0 auto 16px;
  border-radius: 12px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  font-size: 64px;
}
.now-playing .song-title {
  font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 4px;
}
.now-playing .song-artist {
  font-size: 14px; color: #999; margin-bottom: 16px;
}

/* Controls */
.controls {
  display: flex; align-items: center; justify-content: center; gap: 16px;
  margin-bottom: 12px;
}
.controls button {
  width: 44px; height: 44px; border-radius: 50%;
  border: none; cursor: pointer; font-size: 20px;
  background: rgba(255,255,255,0.1); color: #fff;
  transition: all 0.2s;
}
.controls button:hover { background: rgba(255,255,255,0.2); }
.controls .btn-play {
  width: 56px; height: 56px; font-size: 26px;
  background: #6366f1;
}
.controls .btn-play:hover { background: #4f46e5; }

/* Progress */
.progress-bar {
  width: 100%; height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
  margin-bottom: 6px;
}
.progress-bar .fill {
  height: 100%; background: #6366f1; border-radius: 2px;
  width: 0%; transition: width 0.1s linear;
}
.time-row {
  display: flex; justify-content: space-between;
  font-size: 11px; color: #777;
}

/* Volume */
.volume-row {
  display: flex; align-items: center; gap: 8px;
  justify-content: center; margin-top: 8px;
}
.volume-row span { font-size: 14px; }
.volume-row input[type="range"] {
  width: 100px; accent-color: #6366f1;
}

/* Tabs */
.tabs {
  display: flex; gap: 0;
  background: rgba(255,255,255,0.05);
  border-radius: 12px; overflow: hidden;
}
.tab-btn {
  flex: 1; padding: 10px; text-align: center;
  font-size: 13px; color: #999; cursor: pointer;
  border: none; background: none;
  transition: all 0.2s;
}
.tab-btn.active { background: #6366f1; color: #fff; }
.tab-btn:not(.active):hover { color: #ddd; }

/* Playlist & Favorites */
.list-panel {
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  max-height: 280px; overflow-y: auto;
  display: none;
}
.list-panel.active { display: block; }
.list-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 13px;
}
.list-item.playing { background: rgba(99,102,241,0.2); }
.list-item .pl-title { flex: 1; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-item .pl-artist { color: #888; font-size: 11px; max-width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-item button {
  background: none; border: none; color: #666; cursor: pointer;
  font-size: 14px; padding: 4px;
}
.list-item button:hover { color: #f87171; }

/* Lyrics */
.lyrics-panel {
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  max-height: 280px; overflow-y: auto;
  padding: 16px;
  display: none;
  text-align: center;
}
.lyrics-panel.active { display: block; }
.lyric-line {
  padding: 6px 0; font-size: 14px; color: #666;
  transition: all 0.3s;
}
.lyric-line.active { color: #6366f1; font-size: 16px; font-weight: bold; }

.empty-state {
  text-align: center; padding: 40px 20px; color: #555;
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

@media (max-width: 480px) {
  .player-container { gap: 12px; }
  .now-playing .cover { width: 160px; height: 160px; font-size: 48px; }
}
</style>
</head>
<body>

<div class="player-container">
  <!-- Search -->
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索歌曲、歌手..." onkeydown="if(event.key==='Enter')searchSongs()">
    <button onclick="searchSongs()">🔍 搜索</button>
  </div>

  <!-- Results -->
  <div class="results-panel" id="resultsPanel"></div>

  <!-- Now Playing -->
  <div class="now-playing" id="nowPlaying">
    <div class="cover">🎵</div>
    <div class="song-title" id="npTitle">未在播放</div>
    <div class="song-artist" id="npArtist">搜索歌曲开始</div>

    <div class="controls">
      <button onclick="prevSong()" title="上一首">⏮</button>
      <button class="btn-play" id="btnPlay" onclick="togglePlay()">▶</button>
      <button onclick="nextSong()" title="下一首">⏭</button>
    </div>

    <div class="progress-bar" id="progressBar" onclick="seek(event)">
      <div class="fill" id="progressFill"></div>
    </div>
    <div class="time-row">
      <span id="curTime">00:00</span>
      <span id="durTime">00:00</span>
    </div>

    <div class="volume-row">
      <span>🔈</span>
      <input type="range" id="volumeSlider" min="0" max="100" value="70" oninput="setVolume(this.value)">
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('playlist')">📋 播放列表</button>
    <button class="tab-btn" onclick="switchTab('lyrics')">🎤 歌词</button>
    <button class="tab-btn" onclick="switchTab('favorites')">❤️ 收藏</button>
  </div>

  <div class="list-panel active" id="playlistPanel">
    <div class="empty-state"><div class="icon">📋</div>播放列表为空<br>搜索歌曲并添加</div>
  </div>
  <div class="lyrics-panel" id="lyricsPanel">
    <div class="empty-state"><div class="icon">🎤</div>暂无歌词</div>
  </div>
  <div class="list-panel" id="favoritesPanel">
    <div class="empty-state"><div class="icon">❤️</div>暂无收藏</div>
  </div>
</div>

<!-- Hidden audio element -->
<audio id="audio" preload="auto"></audio>

<script>
// ============ CONFIG ============
const API_BASE = 'https://music-api-player.vercel.app/api';

// ============ STATE ============
let playlist = [];
let currentIndex = -1;
let favorites = JSON.parse(localStorage.getItem('music_fav') || '[]');
let lyrics = [];
let isPlaying = false;
let currentLyricIdx = -1;
let searchResults = [];

// ============ AUDIO ============
const audio = document.getElementById('audio');
audio.volume = 0.7;

audio.addEventListener('timeupdate', () => {
  const pct = audio.duration ? (audio.currentTime / audio.duration * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('curTime').textContent = fmtTime(audio.currentTime);
  updateLyric(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
  document.getElementById('durTime').textContent = fmtTime(audio.duration);
});

audio.addEventListener('play', () => { isPlaying = true; updatePlayBtn(); });
audio.addEventListener('pause', () => { isPlaying = false; updatePlayBtn(); });
audio.addEventListener('ended', () => nextSong());
audio.addEventListener('error', () => {
  console.error('Audio error');
  nextSong(); // skip broken songs
});

function updatePlayBtn() {
  document.getElementById('btnPlay').textContent = isPlaying ? '⏸' : '▶';
}

// ============ API CALLS ============
async function apiCall(endpoint, params = {}) {
  const qs = new URLSearchParams(params).toString();
  try {
    const res = await fetch(`${API_BASE}/${endpoint}?${qs}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) {
    console.error(`API ${endpoint} error:`, e.message);
    return null;
  }
}

// ============ SEARCH ============
async function searchSongs() {
  const kw = document.getElementById('searchInput').value.trim();
  if (!kw) return;
  
  const data = await apiCall('search', { keywords: kw, limit: 15 });
  if (!data || !data.result || !data.result.songs) {
    showResults([]);
    return;
  }
  
  searchResults = data.result.songs;
  renderResults(searchResults);
}

function renderResults(songs) {
  const panel = document.getElementById('resultsPanel');
  if (!songs.length) {
    panel.innerHTML = '<div class="empty-state" style="padding:20px">未找到歌曲</div>';
    panel.classList.add('active');
    return;
  }
  
  panel.innerHTML = songs.map((s, i) => {
    const title = s.name || '未知';
    const artist = s.artists ? s.artists.map(a => a.name).join('/') : '未知';
    const id = s.id;
    return `
      <div class="result-item" ondblclick="playSearchResult(${i})">
        <span class="idx">${i+1}</span>
        <div class="info">
          <div class="title">${title}</div>
          <div class="artist">${artist}</div>
        </div>
        <button class="add-btn" onclick="event.stopPropagation();addToPlaylist(${i})">＋添加</button>
      </div>`;
  }).join('');
  panel.classList.add('active');
}

function showResults(songs) {
  searchResults = songs;
  renderResults(songs);
}

function playSearchResult(idx) {
  const song = searchResults[idx];
  if (!song) return;
  addToPlaylist(idx);
  currentIndex = playlist.length - 1;
  playCurrent();
}

async function addToPlaylist(resultIdx) {
  const song = searchResults[resultIdx];
  if (!song) return;
  
  const title = song.name;
  const artist = song.artists ? song.artists.map(a => a.name).join('/') : '';
  const existing = playlist.find(p => p.id === song.id);
  if (existing) return; // already in playlist
  
  playlist.push({
    id: song.id,
    title,
    artist,
    album: song.album?.name || '',
    duration: song.duration || 0
  });
  
  renderPlaylist();
}

// ============ PLAYBACK ============
async function playCurrent() {
  if (currentIndex < 0 || currentIndex >= playlist.length) return;
  
  const song = playlist[currentIndex];
  document.getElementById('npTitle').textContent = song.title;
  document.getElementById('npArtist').textContent = song.artist;
  document.getElementById('durTime').textContent = fmtTime(song.duration / 1000);
  document.getElementById('curTime').textContent = '00:00';
  document.getElementById('progressFill').style.width = '0%';
  lyrics = [];
  currentLyricIdx = -1;
  renderLyrics();
  
  // Get song URL
  const data = await apiCall('song-url', { id: song.id });
  if (!data || !data.data || !data.data[0] || !data.data[0].url) {
    console.error('No playable URL for', song.title);
    nextSong();
    return;
  }
  
  audio.src = data.data[0].url;
  audio.play().catch(e => {});
  renderPlaylist();
  
  // Load lyrics in background
  loadLyrics(song.id);
}

async function loadLyrics(id) {
  const data = await apiCall('lyric', { id });
  if (!data || !data.lrc || !data.lrc.lyric) return;
  
  const raw = data.lrc.lyric;
  const lines = raw.split('\n');
  lyrics = [];
  for (const line of lines) {
    const m = line.match(/\[(\d+):(\d+(?:\.\d+)?)\](.*)/);
    if (m) {
      const time = parseInt(m[1]) * 60 + parseFloat(m[2]);
      const text = m[3].trim();
      if (text) lyrics.push({ time, text });
    }
  }
  lyrics.sort((a, b) => a.time - b.time);
  renderLyrics();
}

function updateLyric(seconds) {
  if (!lyrics.length) return;
  let idx = -1;
  for (let i = 0; i < lyrics.length; i++) {
    if (lyrics[i].time <= seconds) idx = i;
    else break;
  }
  if (idx !== currentLyricIdx) {
    currentLyricIdx = idx;
    renderLyrics();
    // Scroll to active
    const active = document.querySelector('.lyric-line.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function renderLyrics() {
  const panel = document.getElementById('lyricsPanel');
  if (!lyrics.length) {
    panel.innerHTML = '<div class="empty-state"><div class="icon">🎤</div>暂无歌词</div>';
    return;
  }
  panel.innerHTML = lyrics.map((l, i) => 
    `<div class="lyric-line${i === currentLyricIdx ? ' active' : ''}">${l.text}</div>`
  ).join('');
}

function togglePlay() {
  if (!audio.src && playlist.length) {
    currentIndex = 0;
    playCurrent();
    return;
  }
  if (!audio.src) return;
  if (isPlaying) audio.pause();
  else audio.play().catch(e => {});
}

function nextSong() {
  if (!playlist.length) return;
  currentIndex = (currentIndex + 1) % playlist.length;
  playCurrent();
}

function prevSong() {
  if (!playlist.length) return;
  currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
  playCurrent();
}

function seek(e) {
  if (!audio.duration) return;
  const rect = e.target.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
}

function setVolume(v) {
  audio.volume = v / 100;
}

// ============ PLAYLIST ============
function renderPlaylist() {
  const panel = document.getElementById('playlistPanel');
  if (!playlist.length) {
    panel.innerHTML = '<div class="empty-state"><div class="icon">📋</div>播放列表为空<br>搜索歌曲并添加</div>';
    return;
  }
  
  panel.innerHTML = playlist.map((s, i) => `
    <div class="list-item${i === currentIndex ? ' playing' : ''}" ondblclick="playFromList(${i})">
      <span style="color:#888;font-size:11px">${i+1}</span>
      <span class="pl-title">${s.title}</span>
      <span class="pl-artist">${s.artist}</span>
      <button onclick="event.stopPropagation();toggleFav(${i})" title="${isFav(s.id)?'取消收藏':'收藏'}">${isFav(s.id)?'❤️':'🤍'}</button>
      <button onclick="event.stopPropagation();removeFromPlaylist(${i})" title="移除">✕</button>
    </div>
  `).join('');
}

function playFromList(idx) {
  currentIndex = idx;
  playCurrent();
}

function removeFromPlaylist(idx) {
  if (idx === currentIndex) {
    audio.pause();
    audio.src = '';
    currentIndex = -1;
  } else if (idx < currentIndex) {
    currentIndex--;
  }
  playlist.splice(idx, 1);
  renderPlaylist();
  if (currentIndex < 0 && playlist.length) {
    currentIndex = 0;
    playCurrent();
  }
}

// ============ FAVORITES ============
function isFav(id) { return favorites.some(f => f.id === id); }

function toggleFav(plIdx) {
  const song = playlist[plIdx];
  if (!song) return;
  
  const idx = favorites.findIndex(f => f.id === song.id);
  if (idx >= 0) {
    favorites.splice(idx, 1);
  } else {
    favorites.push({ ...song });
  }
  saveFavs();
  renderPlaylist();
  renderFavorites();
}

function saveFavs() {
  localStorage.setItem('music_fav', JSON.stringify(favorites));
}

function renderFavorites() {
  const panel = document.getElementById('favoritesPanel');
  if (!favorites.length) {
    panel.innerHTML = '<div class="empty-state"><div class="icon">❤️</div>暂无收藏</div>';
    return;
  }
  
  panel.innerHTML = favorites.map((s, i) => `
    <div class="list-item" ondblclick="playFav(${i})">
      <span style="color:#f87171">❤️</span>
      <span class="pl-title">${s.title}</span>
      <span class="pl-artist">${s.artist}</span>
      <button onclick="event.stopPropagation();removeFav(${i})" title="取消收藏">✕</button>
    </div>
  `).join('');
}

function playFav(idx) {
  const song = favorites[idx];
  // Add to playlist if not there
  const plIdx = playlist.findIndex(p => p.id === song.id);
  if (plIdx >= 0) {
    currentIndex = plIdx;
  } else {
    playlist.push({ ...song });
    currentIndex = playlist.length - 1;
  }
  renderPlaylist();
  playCurrent();
  switchTab('playlist');
}

function removeFav(idx) {
  favorites.splice(idx, 1);
  saveFavs();
  renderFavorites();
  renderPlaylist();
}

// ============ UI ============
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.list-panel, .lyrics-panel').forEach(p => p.classList.remove('active'));
  
  if (tab === 'playlist') {
    document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
    document.getElementById('playlistPanel').classList.add('active');
  } else if (tab === 'lyrics') {
    document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
    document.getElementById('lyricsPanel').classList.add('active');
  } else {
    document.querySelector('.tab-btn:nth-child(3)').classList.add('active');
    document.getElementById('favoritesPanel').classList.add('active');
  }
}

function fmtTime(sec) {
  if (!sec || !isFinite(sec)) return '00:00';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ============ INIT ============
renderFavorites();
</script>
</body>
</html>
