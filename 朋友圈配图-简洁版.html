<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#EDEDED;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;padding:20px}
.card{width:420px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,0.12)}
.bg{background:linear-gradient(135deg,#0F172A 0%,#1E293B 100%);padding:32px 24px 22px;text-align:center;position:relative}
.bg::after{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.03)}
.bg h1{font-size:26px;font-weight:800;color:#fff;letter-spacing:1px;margin-bottom:2px}
.bg .tagline{font-size:14px;color:#C8A84E;font-weight:500;margin-bottom:4px}
.bg .tags{font-size:12px;color:#94A3B8;letter-spacing:0.5px}
.body{padding:22px 24px 8px}
.msg p{font-size:15.5px;color:#1E293B;line-height:1.9;margin-bottom:2px}
.msg .highlight{color:#C8A84E;font-weight:600}
.qr-wrap{text-align:center;padding:14px 0}
.qr-wrap img{width:120px;height:120px;display:block;margin:0 auto;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.qr-wrap .hint{font-size:11px;color:#94A3B8;margin-top:6px}
.footer{padding:10px 24px 18px;text-align:center;font-size:10.5px;color:#B0B0B0;line-height:1.5;border-top:1px solid #F0F0F0}
</style>
